{% extends "../base.html" %}

{% block title %}Chai page{% endblock title %}

{% block content %}
<div class="container text-center mt-4 mb-5">
    <div class="row justify-content-center">
        {% for chai in chais %}
        <div class="col-12 col-md-6 col-lg-4 mb-4 d-flex justify-content-center">
            <div class="chai-item">
                <div class="card" style="width: 24rem;">
                    <img src="{{ chai.image.url }}" class="card-img-top" alt="{{ chai.name }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ chai.name }}</h5>
                        <a href="{% url 'specific_chai' chai.id %}">
                            <button type="button" class="btn btn-primary">{{chai.type}}-{{chai.id}}</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock content %}
