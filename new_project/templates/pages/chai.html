{% extends "../base.html" %}

{% block title %}Chai page{% endblock title %}

{% block content %}
<h1>This is the Chai page.</h1>
<p>This is the all chai you need</p>
{% for chai in chais %}
<div class="chai-item">
    <img src="{{chai.image.url}}" alt="">
    <p>{{chai.name}}</p>
    <a href="{% url 'specific_chai' chai.id %}">
        <button>
            {{chai.type}}-{{chai.id}}
        </button>
    </a>
    <p>{{chai.description}}</p>
</div>
{% endfor %}
{% endblock content %}
