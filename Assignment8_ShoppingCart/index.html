<!-- Problem Statement
Create a shopping cart where:
● Products are stored as objects
● User can add/remove items
● Total price updates dynamically
● Quantity changes affect total -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛒 Simple Shopping Cart</h1>
        
        <div class="products-section">
            <h2>Available Products</h2>
            <div id="products" class="products-grid"></div>
        </div>

        <div class="cart-section">
            <h2>Your Cart</h2>
            <div id="cart" class="cart-items"></div>
            <div class="cart-total">
                <h3>Total: $<span id="total">0.00</span></h3>
                <button onclick="clearCart()" class="clear-btn">Clear Cart</button>
            </div>
        </div>
    </div>
    
    <script src="cart.js"></script>
</body>
</html>
